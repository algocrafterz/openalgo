# Batch backtest configuration for ORB strategy
# All 25 ORB candidate symbols
# Usage: uv run python backtesting/run_batch.py
# Usage: uv run python backtesting/download_data.py  (download 1m data first)

symbols:
  - NATIONALUM
  - PNB
  - CANBK
  - PFC
  - RECLTD
  - EXIDEIND
  - APOLLOTYRE
  - ASHOKLEY
  - LICHSGFIN
  - TMPV
  - SAIL
  - FEDERALBNK
  - WIPRO
  - BANKBARODA
  - ITC
  - TATASTEEL
  - BPCL
  - BIOCON
  - EMAMILTD
  - JSWENERGY
  - NMDC
  - IRFC
  - IDFCFIRSTB
  - UNIONBANK
  - BANKINDIA

interval: 5m
start_date: "2022-01-04"
end_date: "2026-03-01"
initial_capital: 100000
position_size_pct: 0.10
product: MIS
strategy: orb
slippage_pct: 0.0005  # 0.05% per leg (conservative for ORB momentum entries)

# Index data for direction filter (loaded from DuckDB)
# Use NSE_INDEX exchange for index symbols (not NSE)
index:
  symbol: "NIFTY"
  exchange: NSE_INDEX

# ORB strategy parameters (PineScript defaults)
orb:
  orb_minutes: 15
  breakout_buffer_pct: 0.5

  # Volume filter
  enable_volume_filter: true
  volume_ma_length: 20
  volume_multiplier: 1.2
  strong_volume_multiplier: 1.8

  # Trend filters
  enable_trend_filter: true
  enable_htf_filter: true
  block_counter_trend: true
  htf_ema_length: 20

  # Index direction filter
  enable_index_filter: true

  # Smart entry filters
  enable_gap_filter: true
  max_gap_pct: 2.5

  enable_orb_range_filter: true
  min_orb_range_pct: 0.4
  max_orb_range_pct: 3.5

  enable_min_entry_time: true
  min_entry_hour: 9
  min_entry_minute: 45

  # Stop loss
  stop_mode: ATR
  atr_length: 14
  atr_multiplier: 2.0

  # Target - TP1 is optimal per Q1 analysis
  tp_multiplier: 1.0

  # Session timing
  entry_cutoff_hour: 11
  entry_cutoff_minute: 0
  time_exit_hour: 14
  time_exit_minute: 30

  one_entry_per_session: true
  enable_retest_entry: false
