# Backtest configuration for ORB strategy
# All defaults match PineScript orb-strategy-india.pine exactly
# Edit these values and run: uv run python backtesting/run_orb.py

symbol: SBIN
exchange: NSE
interval: 5m
start_date: "2025-01-01"
end_date: "2026-03-01"
initial_capital: 100000    # PineScript: initial_capital=100000
position_size_pct: 0.10    # 10% of capital per trade
product: MIS               # MIS (intraday) or CNC (delivery)

# Optional: NIFTY index data for index direction filter
# index_symbol: NIFTY
# index_exchange: NSE

# ORB strategy parameters (PineScript defaults)
orb:
  orb_minutes: 15                    # ORB15 enabled, others disabled
  breakout_buffer_pct: 0.5           # breakoutBuffer = 0.5

  # Volume filter
  enable_volume_filter: true         # enableVolumeFilter = true
  volume_ma_length: 20               # volumeMaLength = 20
  volume_multiplier: 1.2             # volumeMultiplier = 1.2
  strong_volume_multiplier: 1.8      # strongVolumeMultiplier = 1.8

  # Trend filters
  enable_trend_filter: true          # enableTrendFilter = true (VWAP mode)
  enable_htf_filter: true            # enableHTF = true
  block_counter_trend: true          # blockCounterTrend = true
  htf_ema_length: 20                 # htfEMA = 20

  # Index direction filter
  enable_index_filter: true          # enableIndexFilter = true (NSE:NIFTY)

  # Smart entry filters
  enable_gap_filter: true            # enableGapFilter = true
  max_gap_pct: 2.5                   # maxGapPercent = 2.5

  enable_orb_range_filter: true      # enableORBRangeFilter = true
  min_orb_range_pct: 0.4             # minORBRangePercent = 0.4
  max_orb_range_pct: 3.5             # maxORBRangePercent = 3.5

  enable_min_entry_time: true        # enableMinEntryTime = true
  min_entry_hour: 9                  # minEntryHour = 9
  min_entry_minute: 45               # minEntryMinute = 45

  # Stop loss
  stop_mode: ATR                     # stopMode default
  atr_length: 14                     # atrLength = 14
  atr_multiplier: 2.0                # atrMultiplier = 2.0

  # Target
  tp_multiplier: 1.5                 # showTP1.5 = true (1.5R)

  # Session timing
  entry_cutoff_hour: 11              # entryCutoffHour = 11
  entry_cutoff_minute: 0             # entryCutoffMinute = 0
  time_exit_hour: 14                 # timeExitHour = 14
  time_exit_minute: 30               # timeExitMinute = 30

  one_entry_per_session: true        # sessionEntryTaken logic
  enable_retest_entry: false         # enableRetestEntry = false

# Transaction costs (Indian market defaults)
# Uncomment to override
# costs:
#   brokerage_pct: 0.0003
#   flat_brokerage: 20.0
