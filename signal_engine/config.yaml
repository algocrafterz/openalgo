# ── Signal Engine Configuration ──────────────────────────
# User-configurable settings. Secrets go in .env instead.

# ── Telegram ─────────────────────────────────────────────
# List of channels to listen to. Each entry needs a name (label) and id.
# id can be a numeric chat ID or @username.
telegram:
  channels:
    - name: "smidestn" #test channel
      id: -1002773559154
    - name: "intraday-orb"
      id: -1003518225740

  # Channel for system notifications (startup, shutdown, errors).
  # Keeps operational alerts separate from trading signal channels.
  # Set to your personal/admin channel. If omitted, notifications go to all signal channels.
  notify_channel:
    name: "anand-smi-assistant"
    id: -1003803150235

# ── Position Sizing ──────────────────────────────────────
# Modes: fixed_fractional | pct_of_capital
sizing:
  mode: fixed_fractional
  risk_per_trade: 0.01         # 1% risk per trade (fixed_fractional)
  pct_of_capital: 0.05         # 5% of capital per trade (pct_of_capital)
  min_entry_price: 150             # Min stock price to trade (0 = no filter)
  max_entry_price: 800             # Max stock price to trade (0 = no filter)
  slippage_factor: 0.10        # Widen risk per share by 10% — entry (MARKET) + TP exit (MARKET) both slip
                               # 0.05 was for LIMIT TP (0 exit slippage); now both legs are MARKET orders
  sandbox_capital: 100000     # Override capital in analyze mode (0 = use OpenAlgo default)
  use_day_start_capital: true  # Cache capital at first signal of day, use for all trades (equal risk per trade)

# ── Risk Management ──────────────────────────────────────
risk:
  daily_loss_limit: 0.04       # 4% of capital (allows 4 losers at 1% before lockout)
  weekly_loss_limit: 0.08      # 8% of capital (allows 2 bad days per week)
  monthly_loss_limit: 0.10     # 10% of capital
  max_portfolio_heat: 0.03     # 3% of capital max open risk (2 concurrent at 1% + buffer)
  max_open_positions: 2        # 2 concurrent slots
  max_trades_per_day: 8        # Safety cap on total trades (slots can recycle within this)
  min_rr: 0.5                  # Minimum reward:risk ratio (safety net — each PineScript strategy enforces its own: ORB >= 1:1, RSI-TP-MR >= 0.5)
  duplicate_window_seconds: 60 # Ignore duplicate signals within this window
  stale_signal_seconds: 60     # Ignore signals older than this
  min_sl_pct: 0.005            # Reject SL tighter than 0.5% of entry (0 = disabled)
  max_positions_per_symbol: 1  # Max concurrent positions in same symbol (0 = no limit)
  max_positions_per_sector: 0  # Disabled — stock universe spans same sectors (FINANCE: PFC, JIOFIN, RECLTD etc.)

# ── Symbol Blacklist ─────────────────────────────────────
# Per-strategy blacklist of symbols to reject. Review monthly using performance data.
# _global: applies to ALL strategies (penny stocks, delisting candidates, etc.)
# Strategy-specific: keyed by strategy tag (ORB, RSI-TP-MR, etc.)
blacklist:
  _global:
    - YESBANK            # Erratic price action, manipulation risk
  ORB:
    - BHEL               # 0% WR, -4.1% PnL (Q1 2026) — PSU, wide spreads
    - MANAPPURAM         # 16.7% WR, -3.2% PnL — NBFC, gaps on RBI news
    - GAIL               # 33.3% WR, -0.5% PnL — policy-driven moves
    - JIOFIN             # 33.3% WR, -0.4% PnL — new listing, erratic
    - TATAPOWER          # 33.3% WR, -0.1% PnL — PSU power, slow momentum

# ── Time Exit ────────────────────────────────────────────
# Close all open positions before broker auto square-off to avoid penalty charges.
# Broker auto square-off is typically 15:10-15:20 IST with Rs 20-50/order charges.
time_exit:
  enabled: true
  hour: 15                     # IST hour (24h format)
  minute: 0                    # IST minute — 15:00 gives 10 min buffer before 15:10 auto square-off

# ── Position Tracking ────────────────────────────────────
tracking:
  poll_interval: 10            # Seconds between position checks (detects broker SL-M fills via qty=0)

# ── Broker / Exchange ────────────────────────────────────
broker:
  exchange: NSE
  product: MIS                 # MIS or CNC
  order_type: MARKET           # MARKET or LIMIT

# ── Listener ─────────────────────────────────────────────
listener:
  max_retries: 5               # Max reconnection attempts
  base_backoff: 2              # Base backoff in seconds (exponential)

# ── API ──────────────────────────────────────────────────
api:
  timeout: 5.0                 # HTTP request timeout in seconds
  margin_retries: 3            # Retry count for Margin API before skipping trade

# ── Bracket Orders ────────────────────────────────────────
bracket:
  enabled: true
  cnc_sl_enabled: false        # CNC SL-M orders are cancelled at EOD by NSE — no overnight protection.
                               # GTT not supported by OpenAlgo. CNC exits via TradingView signals only.
  sl_order_type: SL-M         # SL or SL-M
  max_sl_retries: 5            # Retry count for SL placement (safety-critical — 5 with 0.5s delay = 2.5s window)
  retry_delay: 0.5             # Seconds to wait between retries (prevents hammering broker RMS)
  tp_exit_retries: 3           # Retry count for tracker TP market exit (was 0 — unprotected before)

# ── Strategy Profiles ───────────────────────────────────────
# Per-strategy configuration for multi-TP partial exits and product type.
# tp_levels: mapping of TP level -> fraction of position to exit (cumulative).
#   TP1: 0.5 means exit 50% of position at TP1.
#   TP2: 1.0 means exit remaining 100% at TP2.
# product: default product type for this strategy (MIS, CNC).
# If a strategy is not listed here, TP HIT exits 100% of position (single TP).
strategy_profiles:
  ORB:
    product: MIS
    tp_levels:
      TP1: 1.0                  # ORB: single TP, exit 100% at TP1 HIT
  RSI-TP-MR:
    product: CNC
    tp_levels:
      TP1: 1.0                  # Exit 100% at TP1 (single TP for RSI mean reversion)
